name: Alerte offres data CI

on:
  schedule:
    # Toutes les 3 heures
    - cron: '0 */3 * * *'
  workflow_dispatch: {}   # permet de lancer manuellement depuis l'onglet Actions

permissions:
  contents: write   # nécessaire pour que le workflow puisse committer seen_urls.json

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Cache packages R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ hashFiles('scrape_jobs.R') }}

      - name: Installer les packages R
        run: |
          Rscript -e 'install.packages(c("rvest","httr","jsonlite","stringr","dplyr"), repos="https://cloud.r-project.org")'
          Rscript -e 'library(rvest); library(httr); library(jsonlite); library(stringr); library(dplyr)'

      - name: Lancer le scraping et les alertes
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optionnel : ajoute un secret MATCH_THRESHOLD pour ajuster la
          # sélectivité (3 par défaut si non défini, voir README.md)
          MATCH_THRESHOLD: ${{ secrets.MATCH_THRESHOLD }}
        run: Rscript scrape_jobs.R

      - name: Sauvegarder la mémoire des offres vues
        run: |
          git config user.name "job-alert-bot"
          git config user.email "job-alert-bot@users.noreply.github.com"
          git add data/seen_urls.json
          git diff --quiet --cached || git commit -m "Mise à jour des offres vues [skip ci]"
          git push
